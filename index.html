body{

}

@keyframes fadePage{
from{opacity:0;transform:scale(0.98);}
to{opacity:1;transform:scale(1);}
}

.hero-glow{
position:absolute;
width:300px;
height:300px;
background:#2563eb;
filter:blur(140px);

}

.glass{
background:rgba(255,255,255,0.04);

border-radius:24px;
padding:20px;
}

.section-title{
font-size:22px;
font-weight:bold;
margin:50px 0 20px;
display:flex;
align-items:center;
gap:10px;
color:#60a5fa;
animation:slideIn 0.8s ease;
}

@keyframes slideIn{
from{opacity:0;transform:translateX(-20px);}
to{opacity:1;transform:translateX(0);}
}

.skill{
padding:8px 14px;
font-size:12px;
border-radius:999px;
background:rgba(59,130,246,0.12);
border:1px solid rgba(59,130,246,0.35);
transition:0.3s;
}

.skill:hover{
transform:scale(1.1);
background:rgba(59,130,246,0.25);
}

.card{
background:#161b22;
border:1px solid #2b3138;
border-radius:18px;
padding:14px;
text-align:center;
transition:0.3s;
opacity:0;
transform:translateY(20px);
animation:fadeUp 0.6s forwards;
}

.card:nth-child(1){animation-delay:0.1s;}
.card:nth-child(2){animation-delay:0.2s;}
.card:nth-child(3){animation-delay:0.3s;}
.card:nth-child(4){animation-delay:0.4s;}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 10px 30px rgba(59,130,246,0.25);
border-color:#3b82f6;
}

.card img{
width:70px;
height:70px;
border-radius:18px;
margin:auto;
}

.btn{
display:inline-block;
padding:8px 16px;
border-radius:10px;
font-size:12px;
font-weight:bold;
background:linear-gradient(45deg,#2563eb,#7c3aed);
transition:0.3s;
margin-top:10px;
position:relative;
overflow:hidden;
}

.btn:hover{
transform:scale(1.05);
}

.btn::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:rgba(255,255,255,0.2);
transform:skewX(-20deg);
transition:0.5s;
}

.btn:hover::before{
left:120%;
}

.social-btn{
width:145px;
height:48px;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
font-size:12px;
font-weight:bold;
border-radius:14px;
transition:0.3s;
}

.social-btn:hover{
transform:translateY(-3px);
}

.float-whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(37,211,102,0.5);}
70%{box-shadow:0 0 0 15px rgba(37,211,102,0);}
100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
