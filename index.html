<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adil Waria Hub</title>

<meta name="theme-color" content="#3b82f6">

<!-- INLINE MANIFEST -->
<link rel="manifest" href='data:application/json,{
"name":"Adil Waria Hub",
"short_name":"AdilHub",
"start_url":".",
"display":"standalone",
"background_color":"#0b0f13",
"theme_color":"#3b82f6",
"icons":[{"src":"adil.jpg","sizes":"192x192","type":"image/png"}]
}'>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0f13;
color:white;
text-align:center;
}

.profile{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #3b82f6;
margin-top:20px;
box-shadow:0 0 20px rgba(59,130,246,0.4);
}

input{
width:80%;
padding:10px;
border-radius:10px;
border:none;
margin-top:15px;
}

.card{
background:#161b22;
margin:10px auto;
padding:12px;
width:90%;
max-width:500px;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
border:1px solid #3b82f6;
}

.btn{
display:inline-block;
margin-top:10px;
padding:6px 12px;
background:#3b82f6;
border-radius:8px;
font-size:12px;
color:white;
text-decoration:none;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<img src="adil.jpg" class="profile">

<h1>Muhammad Adil Waria</h1>
<p>Premium Hub App</p>

<input id="search" placeholder="Search items...">

<div id="list"></div>

<a class="whatsapp" href="https://wa.me/923104399047">WA</a>

<script>

/* DATA */
const data = Array.from({length:20},(_,i)=>({
title:"Item "+(i+1),
type:i%3===0?"App":i%3===1?"Book":"Course"
}));

/* RENDER */
function render(list){
document.getElementById("list").innerHTML=
list.map(x=>`
<div class="card item">
<h3>${x.title}</h3>
<p style="color:gray;font-size:12px;">${x.type}</p>
<a class="btn" href="#">Download</a>
</div>
`).join("");
}

render(data);

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".item").forEach(el=>{
el.style.display=el.innerText.toLowerCase().includes(v)?"block":"none";
});
});

/* INLINE SERVICE WORKER (AUTO) */
if('serviceWorker' in navigator){

const swCode = `
self.addEventListener('fetch', function(event){
event.respondWith(fetch(event.request));
});
`;

const blob = new Blob([swCode], {type: "text/javascript"});
navigator.serviceWorker.register(URL.createObjectURL(blob));

}

</script>

</body>
</html>
