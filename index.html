<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adil Waria | Premium Hub</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
background:#0b0f13;
color:white;
font-family:Segoe UI;
}

html{scroll-behavior:smooth}

/* ===== CARD ===== */

.card{
background:#161b22;
border:1px solid #2b3138;
border-radius:16px;
padding:12px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
border-color:#3b82f6;
}

.card img{
width:60px;
height:60px;
border-radius:12px;
margin:auto;
}

/* ===== BUTTON ===== */

.btn{
display:inline-block;
margin-top:10px;
padding:6px 14px;
border-radius:10px;
font-size:11px;
background:linear-gradient(45deg,#2563eb,#7c3aed);
}

/* ===== SEARCH ===== */

.search-box{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:white;
margin-bottom:15px;
}

/* ===== FILTER ===== */

.filter-btn{
padding:6px 12px;
border-radius:10px;
font-size:12px;
background:#1f2937;
cursor:pointer;
transition:0.3s;
}

.filter-btn:hover{
background:#3b82f6;
}

/* ===== GRID ===== */

.grid-box{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

@media(min-width:768px){
.grid-box{grid-template-columns:repeat(4,1fr);}
}

</style>
</head>

<body class="p-4 md:p-10">

<h1 class="text-3xl font-bold text-center text-blue-400 mb-6">
Premium Download Hub
</h1>

<!-- SEARCH -->
<input type="text" id="search" class="search-box" placeholder="Search apps, books, courses...">

<!-- FILTER -->
<div class="flex flex-wrap gap-2 justify-center mb-6">

<div class="filter-btn" onclick="filter('all')">All</div>
<div class="filter-btn" onclick="filter('apps')">Apps</div>
<div class="filter-btn" onclick="filter('books')">Books</div>
<div class="filter-btn" onclick="filter('courses')">Courses</div>

</div>

<!-- APPS -->
<h2 class="text-xl font-bold text-blue-400 mb-3">Apps</h2>
<div id="apps" class="grid-box"></div>

<!-- BOOKS -->
<h2 class="text-xl font-bold text-blue-400 mt-8 mb-3">Books</h2>
<div id="books" class="grid-box"></div>

<!-- COURSES -->
<h2 class="text-xl font-bold text-blue-400 mt-8 mb-3">Courses</h2>
<div id="courses" class="grid-box"></div>

<script>

/* ================= DATA ================= */

const data = {

apps:[
{title:"CapCut Pro",img:"https://via.placeholder.com/120",link:"#"},
{title:"PicsArt Gold",img:"https://via.placeholder.com/120",link:"#"},
{title:"Alight Motion",img:"https://via.placeholder.com/120",link:"#"}
],

books:[
{title:"Islamic Book 1",img:"https://via.placeholder.com/120",link:"#"},
{title:"Islamic Book 2",img:"https://via.placeholder.com/120",link:"#"}
],

courses:[
{title:"AI Course",img:"https://via.placeholder.com/120",link:"#"},
{title:"Web Dev Course",img:"https://via.placeholder.com/120",link:"#"}
]

};

/* ================= RENDER ================= */

function render(){

document.getElementById("apps").innerHTML =
data.apps.map(item=>card(item)).join("");

document.getElementById("books").innerHTML =
data.books.map(item=>card(item)).join("");

document.getElementById("courses").innerHTML =
data.courses.map(item=>card(item)).join("");

}

function card(item){
return `
<div class="card item">
<img src="${item.img}">
<h3 class="text-sm font-bold mt-2">${item.title}</h3>
<a href="${item.link}" class="btn">Download</a>
</div>
`;
}

render();

/* ================= SEARCH ================= */

document.getElementById("search").addEventListener("input",function(){

let value = this.value.toLowerCase();

document.querySelectorAll(".item").forEach(el=>{

let text = el.innerText.toLowerCase();

el.style.display = text.includes(value) ? "block":"none";

});

});

/* ================= FILTER ================= */

function filter(type){

if(type=="all"){
document.querySelectorAll(".item").forEach(e=>e.style.display="block");
return;
}

document.querySelectorAll(".item").forEach(e=>e.style.display="none");

document.querySelectorAll(`#${type} .item`).forEach(e=>e.style.display="block");

}

</script>

</body>
</html>
